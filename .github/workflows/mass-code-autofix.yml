name: "Trigger Mass Copilot Autofixes"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

permissions:
  security-events: write
  contents: write

jobs:
  bulk-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Fetch and Trigger Autofixes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_PATH: ${{ github.repository }}
        run: |
          echo "🔍 Fetching open security alerts for ${REPO_PATH}..."
          
          # 1. Fetch open alerts using curl and save them to a temporary file
          curl -s -L \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://github.com{REPO_PATH}/code-scanning/alerts?state=open&per_page=100" > alerts.json

          # 2. Extract alert numbers that match 'critical' or 'error' severity levels
          # (Using jq, which is pre-installed on all GitHub runners)
          ALERT_NUMBERS=$(jq -r '.[] | select(.rule.severity == "critical" or .rule.severity == "error") | .number' alerts.json 2>/dev/null)

          if [ -z "${ALERT_NUMBERS}" ]; then
            echo "🎉 No critical or error level alerts found. Nothing to fix!"
            exit 0
          fi

          # 3. Loop through each filtered alert number and trigger Copilot Autofix
          for NUM in ${ALERT_NUMBERS}; do
            echo "🤖 Triggering Autofix for Alert #${NUM}..."
            
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://github.com{REPO_PATH}/code-scanning/alerts/${NUM}/autofix")

            if [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ]; then
              echo "✅ Fix initiated successfully for Alert #${NUM}!"
            else
              echo "⚠️ Failed to trigger Alert #${NUM}. Server responded with HTTP status: ${STATUS}"
            fi

            # Short pause to satisfy GitHub's backend API rate limits
            sleep 1
          done
