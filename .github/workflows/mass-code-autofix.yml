name: "Trigger Mass Copilot Autofixes"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

permissions:
  security-events: write
  contents: write

jobs:
  copilot-mass-autofix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Execute Mass Autofix Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FULL_REPO_PATH: ${{ github.repository }}
        run: |
          python -c "
          import os, time, requests

          token = os.environ.get('GITHUB_TOKEN')
          repo_path = os.environ.get('FULL_REPO_PATH')

          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
          }
          
          base_url = f'https://github.com{repo_path}/code-scanning/alerts'

          print(f'🔍 Fetching open security alerts from: {repo_path}')
          response = requests.get(base_url, headers=headers, params={'state': 'open', 'per_page': 100})

          if response.status_code != '200':
              print(f'❌ Failed to fetch alerts: {response.status_code} - {response.text}')
              exit(1)

          all_alerts = response.json()
          
          allowed_severities = ['critical', 'error']
          alerts = [a for a in all_alerts if a.get('rule', {}).get('severity') in allowed_severities]
          
          print(f' Found {len(alerts)} open alerts matching [critical] or [error] severity.')

          for alert in alerts:
              num = alert.get('number')
              rule = alert.get('rule', {}).get('id', 'Unknown Rule')
              severity = alert.get('rule', {}).get('severity', 'unknown')
              
              print(f'🤖 Triggering Autofix for Alert #{num} [{severity.upper()}] ({rule})...')
              fix_url = f'{base_url}/{num}/autofix'
              fix_resp = requests.post(fix_url, headers=headers)
              
              # FIXED: Corrected the syntax here to check for valid success status codes
              if fix_resp.status_code in:
                  print(f'✅ Fix initiated for #{num}!')
              else:
                  print(f'⚠️ Failed to fix #{num}: {fix_resp.status_code} - {fix_resp.text}')
                  
              time.sleep(1)
          " 
