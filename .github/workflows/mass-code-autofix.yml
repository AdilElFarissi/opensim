name: Trigger Mass Copilot Autofixes

on:
  workflow_dispatch:

permissions:
  security-events: write
  contents: write

jobs:
  bulk-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Forces step logging visibility even if setup fails
      - name: Execute Mass Autofix Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_PATH: ${{ github.repository }}
        run: |
          chmod +x ./autofix.sh
          ./autofix.sh
