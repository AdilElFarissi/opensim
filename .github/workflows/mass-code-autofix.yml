name: Trigger Mass Copilot Autofixes

on:
  workflow_dispatch:

permissions:
  security-events: write
  contents: write

jobs:
  bulk-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Mass Autofix Execution
        env:
          GITHUB_TOKEN: ${{ secrets.AUTOFIX_PAT }}
          REPO_PATH: ${{ github.repository }}
        run: |
          cat << 'EOF' > run_fixes.py
          import os, time, requests

          token = os.environ.get('GITHUB_TOKEN')
          repo = os.environ.get('REPO_PATH')
          branch = 'master'

          if not token:
              print('❌ Critical Error: AUTOFIX_PAT secret is missing or empty in your repo settings!')
              exit(1)

          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2026-03-10'
          }
          
          base_url = f'https://api.github.com/repos/{repo}/code-scanning/alerts'
          print(f'🔍 Querying alerts from the official API: {base_url}')

          resp = requests.get(base_url, headers=headers, params={'state': 'open', 'per_page': 100})
          
          if resp.status_code != 200:
              print(f'❌ API Error {resp.status_code}: {resp.text}')
              exit(1)

          alerts = resp.json()
          print(f'📋 Total open security alerts found: {len(alerts)}')

          targets = [
              a for a in alerts 
              if a.get('rule', {}).get('severity') in ['critical', 'error', 'high'] 
              or a.get('rule', {}).get('security_severity_level') in ['critical', 'error', 'high']
          ]
          print(f'🎯 Filtered down to {len(targets)} matching severe alerts.')

          if not targets:
              print('🎉 No matching open alerts found. Workflow complete!')
              exit(0)

          for alert in targets:
              num = alert.get('number')
              rule = alert.get('rule', {}).get('id', 'Unknown')
              print(f'🤖 Requesting Autofix for Alert #{num} ({rule})...')
              
              fix_url = f'{base_url}/{num}/autofix'
              commit_url = f'{base_url}/{num}/autofix/commits'
              payload = {
                  'target_ref': 'refs/heads/master',
                  'message': f'Commit Autofix #{num} ({rule})'
              }

              fix_resp = requests.post(fix_url, headers=headers)
              
              if fix_resp.status_code in [200, 201, 202]:
                  print(f'✅ Fix successfully initiated for Alert #{num}!')
                  if fix_resp.status_code == 202:
                      print(f'✅ Fix successfully initiated for Alert #{num} - Status {fix_resp.status_code}')
                  if fix_resp.status_code == 200:
                      print(f'✅ Fix for Alert #{num} already exist! Sending commit to branch {branch} - Status {fix_resp.status_code}')
                      commit_resp = requests.post(commit_url, headers=headers, json=payload)
                      if commit_resp.status_code == 201:
                          print(f'✅ Fix Commit for Alert #{num} successfully created in branch {branch} - Status {fix_resp.status_code}')
                      else:
                          print(f'⚠️ Warning for Commit to fix #{num} failed: Status {fix_resp.status_code} - {fix_resp.text}')
              else:
                  print(f'⚠️ Warning for Alert #{num}: Status {fix_resp.status_code} - {fix_resp.text}')
              
              time.sleep(5)
          EOF
          python run_fixes.py
