name: "Trigger Mass Copilot Autofixes"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

permissions:
  security-events: write
  contents: write

jobs:
  bulk-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Execute Mass Autofix Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_PATH: ${{ github.repository }}
        run: |
          # Make the script file executable and run it safely
          chmod +x ./autofix.sh
          ./autofix.sh
