name: "Bug Detection & OpenRouter Free Fix"

on:
  workflow_dispatch: 

permissions:
  contents: write
  pull-requests: write
  actions: read
  security-events: write

jobs:
  codeql-analysis:
    name: CodeQL Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Pin .NET SDK Version
        run: |
          echo '{"sdk":{"version":"8.0.100","rollForward":"latestFeature"}}' > global.json

      - name: Generate OpenSim Project Files
        run: |
          chmod +x runprebuild.sh
          ./runprebuild.sh dotnet8

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: 'csharp'
          queries: security-extended 

      - name: Restore Dependencies & Build
        run: |
          dotnet restore OpenSim.sln
          dotnet build OpenSim.sln --configuration Debug

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:csharp"
          output: "./codeql-directory"

      - name: Share CodeQL SARIF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif-report
          path: "./codeql-directory/"

  codeql-autofix:
    name: CodeQL Scan & OpenRouter Free Fix
    runs-on: ubuntu-latest
    needs: codeql-analysis
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Download CodeQL SARIF Artifact
        uses: actions/download-artifact@v4
        with:
          name: codeql-sarif-report
          path: ./
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install AI Dependencies
        run: |
          pip install openai==1.58.0

      - name: Execute Automated Code Repair Script
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          cat << 'EOF' > fix_code.py
          import os
          import json
          import re
          import time
          from openai import OpenAI
          from openai import APIStatusError

          client = OpenAI(
              base_url="https://openrouter.ai/api/v1",
              api_key=os.environ.get("OPENROUTER_API_KEY"),
          )

          #rules = ""
          #if os.path.exists(".github/copilot-instructions.md"):
              #with open(".github/copilot-instructions.md", "r") as f:
                  #rules = f.read()

          if not os.path.exists("csharp.sarif"):
              print("Critical: csharp.sarif was not found on disk.")
              exit(0)

          with open("csharp.sarif", "r") as f:
              sarif_data = json.load(f)

          runs = sarif_data.get("runs", [])
          fixed_count = 0

          already_patched = set()
          if os.path.exists(patched_files.json):
              with open("patched_files.json", "r") as f_exclude_r:
                  already_patched = set(json.load(f_exclude_r))

          vulnerabilities_by_file = {}
          files2patch = set()

          for run in runs:
              for result in run.get("results", []):
                  rule_id = result.get("ruleId", "Unknown-Rule")
                  message_text = result.get("message", {}).get("text", "No details provided.")

                  for loc in result.get("locations", []):
                      phys_loc = loc.get("physicalLocation", {})
                      uri = phys_loc.get("artifactLocation", {}).get("uri", "")
                      line_num = phys_loc.get("region", {}).get("startLine", "Unknown Line")

                      if uri.startswith("file://"):
                          uri = uri.replace("file://", "")
                      if uri.startswith("/"):
                          uri = uri[1:]
                      if uri and uri.endswith(".cs"):
                          files2patch.add(uri)
                          if uri not in vulnerabilities_by_file:
                              vulnerabilities_by_file[uri] = []
                          
                          vulnerabilities_by_file[uri].append({
                              "line": line_num,
                              "rule_id": rule_id,
                              "message": message_text
                          })

          print(f"📋 CodeQL detected {len(files2patch)} unique file!")

          pr_body_details = "### 🔍 Detected Vulnerabilities by File (with lines):\n"
          if not vulnerabilities_by_file:
              pr_body_details += "_No C# vulnerabilities found or parsed._\n"
          for file_path, items in vulnerabilities_by_file.items():
              pr_body_details += f"\n📁 **{file_path}**\n"
              for item in items:
                  pr_body_details += f"  - Line **{item['line']}** | `{item['rule_id']}`: {item['message']}\n"

          with open("pr_details.txt", "w", encoding="utf-8") as f_details:
              f_details.write(pr_body_details)

          MAX_ALERTS_PER_FILE = 20

          stop_all_processing = False

          for file in files2patch:
              if stop_all_processing:
                  print("🛑 Processing stopped globally due to Rate Limit conditions.")
                  break

              if not os.path.exists(file):
                  print(f"⚠️ File not found on local disk : {file}")
                  continue

              if file in already_patched:
                  print(f"⚠️ This file is already patched : {file}")
                  continue

              print(f"🤖 AI processing for the file : {file}")
              
              with open(file, "r", encoding="utf-8") as f_code:
                  file_content = f_code.read() 

              all_alerts = vulnerabilities_by_file[file]
              total_alerts = len(all_alerts)
              
              try:
                  all_alerts.sort(key=lambda x: int(x['line']) if str(x['line']).isdigit() else 999999)
              except Exception:
                  pass

              limited_alerts = all_alerts[:MAX_ALERTS_PER_FILE]

              file_alerts_ctx = f"Total vulnerabilities in this file: {total_alerts}\n"
              if total_alerts > MAX_ALERTS_PER_FILE:
                  file_alerts_ctx += f"⚠️ Context limited to the first {MAX_ALERTS_PER_FILE} priority vulnerabilities to optimize processing.\n\n"
              else:
                  file_alerts_ctx += "Listing all vulnerabilities:\n\n"

              for idx, alert in enumerate(limited_alerts, start=1):
                  file_alerts_ctx += f"[{idx}] LINE {alert['line']} | ID: {alert['rule_id']} | DESC: {alert['message']}\n"

              fixed_file_content = None

              models_pool = [
                  "poolside/laguna-xs-2.1:free"
              ]

              for current_model in models_pool:
                  try:
                      print(f"  -> Attempting fix using model: {current_model}")
                      
                      raw_response = client.chat.completions.with_raw_response.create(
                          model=current_model,
                          messages=[
                              {
                                  "role": "system", 
                                  "content": f"You are an expert C# refactoring tool. Your primary task is to review the code and fix vulnerabilities focusing on the provided specific lines. Give absolute priority to keeping the source structure intact. Add the missing summaries.\nInstructions:\n1. Return the ENTIRE corrected source code. No placeholders, no cuts.\n2. Return ONLY clean functional code. No markdown boxes (```), no conversational text.\n3. Do not use 'var' or change the types to 'var'.\n4. Do not remove the commented copyright header."
                              },
                              {
                                  "role": "user", 
                                  "content": f"=== SOURCE CODE TO REPAIR ===\n{file_content}\n\n=== VULNERABILITIES TO TARGET AT LINES ===\n{file_alerts_ctx}"
                              }
                          ]
                      )

                      limit = raw_response.headers.get("x-ratelimit-limit")
                      remaining = raw_response.headers.get("x-ratelimit-remaining")
                      
                      if remaining is not None and str(remaining).strip() == "0":
                          print(f"\n ⚠️ [PREVENTIVE STOP] Quota reached (X-RateLimit-Remaining: 0). Total Limit: {limit}")
                          stop_all_processing = True
                      
                      response = raw_response.parse()

                      if hasattr(response, 'choices') and len(response.choices) > 0:
                          raw_content = response.choices[0].message.content
                      elif isinstance(response, dict) and "choices" in response:
                          raw_content = response["choices"][0]["message"]["content"]
                      else:
                          raw_content = str(response)

                      if not raw_content:
                          print(f"  ⚠️ Empty response from {current_model}")
                          if stop_all_processing: 
                              break
                          continue

                      cleaned_check = raw_content.lower().strip()

                      if "<html" in cleaned_check or "<a href=" in cleaned_check or "<!doctype" in cleaned_check or "next/static" in cleaned_check:
                          print(f"  ⚠️ Model {current_model} was blocked by an OpenRouter server HTML error page. Switching model...")
                          time.sleep(5)
                          if stop_all_processing: 
                              break
                          continue
                          
                      cleaned_code = re.sub(r'^```(?:csharp)?\n', '', raw_content, flags=re.IGNORECASE)
                      cleaned_code = re.sub(r'\n```$', '', cleaned_code).strip()
                        
                      if len(cleaned_code) > 10:
                          fixed_file_content = cleaned_code
                          print(f"  🎉 Valid response successfully retrieved from {current_model} !")
                          break
                                  
                  except APIStatusError as e:
                      err_headers = getattr(e, 'headers', {})
                      err_remaining = err_headers.get("x-ratelimit-remaining")
                      err_limit = err_headers.get("x-ratelimit-limit")

                      if e.status_code == 429 or (err_remaining is not None and str(err_remaining).strip() == "0"):
                          print(f"\n🚨 [RATE LIMIT TRIGGERED] Code: {e.status_code}")
                          print(f"Headers -> Limit: {err_limit} | Remaining: {err_remaining}")
                          print(f"Message: {e.message}")
                          stop_all_processing = True
                          break
                      else:
                          print(f"  ⚠️ API Error ({e.status_code}) with {current_model}: {e.message}. Trying fallback...")
                          time.sleep(5)

                  except Exception as e:
                      print(f"  ⚠️ Connection issue with {current_model}: {str(e)}. Trying fallback...")
                      time.sleep(5)

              if stop_all_processing:
                  print(f"❌ Stopped before saving {file}. Exiting loop entirely.")
                  break

              if fixed_file_content:                              
                  with open(file, "w", encoding="utf-8") as f_code_w:
                      f_code_w.write(fixed_file_content)
                        
                  print(f"✅ Successfully patched local file: {file}")
                  fixed_count += 1
                  already_patched.add(file)
                  time.sleep(5)
              else:
                  print(f"❌ Failed to patch {file} with all models.")
                  already_patched.discard(file)

          print(f"Code repair cycle completed. Total files safely patched: {fixed_count}")

          with open(patched_files.json, "w") as f_exclude_w:
              json.dump(list(already_patched), f_exclude_w)
          
          EOF
          python fix_code.py
          rm fix_code.py

      - name: Create Pull Request with AI Fixes
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "style: resolve static security vulnerabilities via OpenRouter AI"
          title: "🤖 Automated OpenRouter Security Patch"
          body-path: pr_description.txt
          branch: openrouter-ai-patches-rev1
          base: 'master'
          delete-branch: true
