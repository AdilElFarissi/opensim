#
# See https://semgrep.dev/docs

name: Semgrep

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    permissions:
      contents: read 
      security-events: write 
      actions: read 
    name: scan
    runs-on: ubuntu-latest
    
    # We use the official Semgrep Docker image directly to guarantee consistency
    container:
      image: semgrep/semgrep:latest

    steps:
      # 1. Checkout project source
      - uses: actions/checkout@v4

      # 2. Scan code and write explicitly to semgrep.sarif
      - name: Run Semgrep CLI
        continue-on-error: true
        run: |
          semgrep ci \
            --sarif \
            --output=semgrep.sarif \
            --config=p/default \
            --config=p/security-audit
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
          SEMGREP_DEPLOYMENT_ID: ${{ secrets.SEMGREP_DEPLOYMENT_ID }}

      # 3. Upload SARIF to GitHub security dashboard
      - name: Upload SARIF to Security Tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
        if: always()

      # 4. Save the file as a downloadable GitHub Action artifact
      - name: Save SARIF as downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif-file
          path: semgrep.sarif
        if: always()

