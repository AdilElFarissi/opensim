name: "Trigger Mass Copilot Autofixes"

on:
  # Allows you to trigger this manually from the Actions tab
  workflow_dispatch:
  
  # Optional: Runs automatically every Sunday at midnight
  schedule:
    - cron: '0 0 * * 0'

# Crucial permission block required to interact with Code Scanning & Autofix APIs
permissions:
  security-events: write
  contents: write

jobs:
  bulk-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Execute Mass Autofix Script
        env:
          # Automatically injects the secure GitHub Action token
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Injects the current repository details dynamically
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          python -c "
          import os, time, requests

          token = os.environ.get('GITHUB_TOKEN')
          owner = os.environ.get('REPO_OWNER')
          repo = os.environ.get('REPO_NAME')

          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
          }
          base_url = f'https://github.com{owner}/{repo}/code-scanning/alerts'

          print('🔍 Fetching open security alerts...')
          # Fetch open alerts. We will filter the severities in python.
          response = requests.get(base_url, headers=headers, params={'state': 'open', 'per_page': 100})

          if response.status_code != 200:
              print(f'❌ Failed to fetch alerts: {response.status_code}')
              exit(1)

          all_alerts = response.json()
          
          # Target only critical and error levels
          allowed_severities = ['critical', 'error']
          alerts = [a for a in all_alerts if a.get('rule', {}).get('severity') in allowed_severities]
          
          print(f' Found {len(alerts)} open alerts matching [critical] or [error] severity.')

          for alert in alerts:
              num = alert.get('number')
              rule = alert.get('rule', {}).get('id', 'Unknown Rule')
              severity = alert.get('rule', {}).get('severity', 'unknown')
              
              print(f'🤖 Triggering Autofix for Alert #{num} [{severity.upper()}] ({rule})...')
              fix_url = f'{base_url}/{num}/autofix'
              fix_resp = requests.post(fix_url, headers=headers)
              
              if fix_resp.status_code in:
                  print(f'✅ Fix initiated for #{num}!')
              else:
                  print(f'⚠️ Failed to fix #{num}: {fix_resp.status_code}')
                  
              time.sleep(1) # Courteous rate-limiting pause
          "
