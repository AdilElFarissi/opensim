name: "Security & Bug Detection Pipeline"

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch: 

permissions:
  contents: write
  pull-requests: write
  actions: read
  security-events: write

jobs:
  codeql-analysis:
    name: CodeQL Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Pin .NET SDK Version
        run: |
          echo '{"sdk":{"version":"8.0.100","rollForward":"latestFeature"}}' > global.json

      - name: Generate OpenSim Project Files
        run: |
          chmod +x runprebuild.sh
          ./runprebuild.sh dotnet8

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: 'csharp'
          queries: security-extended,security-and-quality 

      - name: Restore Dependencies & Build
        run: |
          dotnet restore OpenSim.sln
          dotnet build OpenSim.sln --configuration Debug

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:csharp"

  semgrep-and-autofix:
    name: Semgrep Scan & OpenRouter Free Fix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Semgrep & AI Dependencies
        run: |
          pip install semgrep openai==1.58.0

      - name: Run Semgrep Scan
        run: |
          semgrep scan --config p/csharp --config p/security-audit --sarif --output semgrep-results.sarif
        continue-on-error: true

      - name: Execute Automated Code Repair Script
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          cat << 'EOF' > fix_code.py
          import os
          import json
          import re
          import time
          from openai import OpenAI

          # Configuration du client OpenRouter
          client = OpenAI(
              base_url="https://openrouter.ai/api/v1",
              api_key=os.environ.get("OPENROUTER_API_KEY"),
          )

          rules = ""
          if os.path.exists(".github/copilot-instructions.md"):
              with open(".github/copilot-instructions.md", "r") as f:
                  rules = f.read()

          if not os.path.exists("semgrep-results.sarif"):
              print("Critical: semgrep-results.sarif was not found on disk.")
              exit(0)

          with open("semgrep-results.sarif", "r") as f:
              sarif_data = json.load(f)

          runs = sarif_data.get("runs", [])
          fixed_count = 0

          files2patch = set()
          for run in runs:
              for result in run.get("results", []):
                  for loc in result.get("locations", []):
                      uri = loc.get("physicalLocation", {}).get("artifactLocation", {}).get("uri", "")
                      if uri.startswith("file://"):
                          uri = uri.replace("file://", "")
                      # Nettoyage des slashes initiaux si présents
                      if uri.startswith("/"):
                          uri = uri[1:]
                      if uri and uri.endswith(".cs"):
                          files2patch.add(uri)

          print(f"📋 Fichiers uniques détectés par Semgrep : {list(files2patch)}")

          for file in files2patch:
              if not os.path.exists(file):
                  print(f"⚠️ Fichier introuvable sur le disque local : {file}")
                  continue

              print(f"🤖 AI processing C# file: {file}")
              
              with open(file, "r", encoding="utf-8") as f_code:
                  file_content = f_code.read() 

              fixed_file_content = None
              
              models_pool = [
                  "openrouter/auto",
                  "qwen/qwen-2.5-coder-32b:free",
                  "meta-llama/llama-3.3-70b-instruct:free",
                  "google/gemini-2.5-flash:free",
                  "microsoft/phi-3-medium-128k-instruct:free"
              ]

              for current_model in models_pool:
                  try:
                      print(f"  -> Attempting fix using model: {current_model}")
                      response = client.chat.completions.create(
                          model=current_model,
                          messages=[
                              {
                                  "role": "system", 
                                  "content": f"You are an expert C# refactoring utility. Your goal is to analyze the provided full source code of OpenSimulator, find the security vulnerability, and fix it.\nInstructions:\n1. Return the ENTIRE corrected source code of the file. Do NOT truncate or use placeholders.\n2. Return ONLY the functional code. Do not wrap code blocks in markdown fences (like ```), and do not output any markdown explanations.\nRules:\n{rules}"
                              },
                              {
                                  "role": "user", 
                                  "content": f"Full File Content:\n{file_content}"
                              }
                          ]
                      )
                            
                      if hasattr(response, 'choices') and len(response.choices) > 0:
                          raw_content = response.choices[0].message.content
                      elif isinstance(response, dict) and "choices" in response:
                          raw_content = response["choices"][0]["message"]["content"]
                      else:
                          raw_content = str(response)

                      if not raw_content:
                          print(f"  ⚠️ Réponse vide du modèle {current_model}")
                          continue

                      cleaned_check = raw_content.lower().strip()

                      if "<html" in cleaned_check or "<a href=" in cleaned_check or "<!doctype" in cleaned_check or "next/static" in cleaned_check:
                          print(f"  ⚠️ Model {current_model} was blocked by an OpenRouter server HTML error page. Switching model...")
                          time.sleep(5)
                          continue
                          
                      cleaned_code = re.sub(r'^```(?:csharp)?\n', '', raw_content, flags=re.IGNORECASE)
                      cleaned_code = re.sub(r'\n```$', '', cleaned_code).strip()
                        
                      if len(cleaned_code) > 10:
                          fixed_file_content = cleaned_code
                          print(f"  🎉 Valid response successfully retrieved from{current_model} !")
                          break
                                  
                  except Exception as e:
                      print(f"  ⚠️ Connection issue with {current_model}: {str(e)}. Trying fallback...")
                      time.sleep(5)

              if fixed_file_content:                              
                  with open(file, "w", encoding="utf-8") as f_code_w:
                      f_code_w.write(fixed_file_content)
                        
                  print(f"✅ Successfully patched local file: {file}")
                  fixed_count += 1
                  time.sleep(5)
              else:
                  print(f"❌ Failed to patch {file} with all models.")

          print(f"Code repair cycle completed. Total files safely patched: {fixed_count}")
          EOF
          python fix_code.py
          rm fix_code.py
          
      - name: Create Pull Request with AI Fixes
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "style: resolve static security vulnerabilities via OpenRouter AI"
          title: "🤖 Automated OpenRouter Security Patch"
          body: "This PR automatically fixes static analysis alerts generated by the Semgrep security runner pipeline using OpenRouter Cloud Models according to repository guidelines."
          branch: openrouter-ai-patches
          base: 'master'
          delete-branch: true
