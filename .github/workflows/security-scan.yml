name: "Security & Bug Detection Pipeline"

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch: 

permissions:
  contents: write
  pull-requests: write
  actions: read
  security-events: write

jobs:
  codeql-analysis:
    name: CodeQL Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Pin .NET SDK Version
        run: |
          echo '{"sdk":{"version":"8.0.100","rollForward":"latestFeature"}}' > global.json

      - name: Generate OpenSim Project Files
        run: |
          chmod +x runprebuild.sh
          ./runprebuild.sh dotnet8

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: 'csharp'
          queries: security-extended,security-and-quality 

      - name: Restore Dependencies & Build
        run: |
          dotnet restore OpenSim.sln
          dotnet build OpenSim.sln --configuration Debug

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:csharp"

  semgrep-and-autofix:
    name: Semgrep Scan & Groq Free Fix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Semgrep & Dedicated Groq SDK
        run: |
          pip install semgrep groq==0.18.0

      - name: Run Semgrep Scan
        run: |
          semgrep scan --config p/csharp --config p/security-audit --sarif --output semgrep-results.sarif
        continue-on-error: true

      - name: Execute Automated Code Repair Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cat << 'EOF' > fix_code.py
          import os
          import json
          import re
          import time
          from collections import defaultdict
          from groq import Groq

          client = Groq(api_key=os.environ.get("GROQ_API_KEY"))

          rules = ""
          if os.path.exists(".github/copilot-instructions.md"):
              with open(".github/copilot-instructions.md", "r") as f:
                  rules = f.read()

          if not os.path.exists("semgrep-results.sarif"):
              print("Critical: semgrep-results.sarif was not found on disk.")
              exit(0)

          with open("semgrep-results.sarif", "r") as f:
              sarif_data = json.load(f)

          runs = sarif_data.get("runs", [])
          
          file_patches = defaultdict(list)
          models_pool = ["llama-3.1-8b-instant"]

          for run in runs:
              for result in run.get("results", []):
                  msg = result.get("message", {}).get("text", "")
                  for loc in result.get("locations", []):
                      uri = loc.get("physicalLocation", {}).get("artifactLocation", {}).get("uri", "")
                      line_num = loc.get("physicalLocation", {}).get("region", {}).get("startLine", 1)
                      
                      if uri.startswith("file://"):
                          uri = uri.replace("file://", "")
                      
                      if uri and os.path.exists(uri) and uri.endswith(".cs"):
                          file_patches[uri].append({"line": line_num, "msg": msg})

          fixed_count = 0

          for uri, patches in file_patches.items():
              with open(uri, "r") as f_code:
                  lines = f_code.readlines()

              patches.sort(key=lambda x: x["line"], reverse=True)
              file_was_patched = False

              print(f"🤖 AI processing C# file: {uri} ({len(patches)} vulnerability spots found)")

              for patch in patches:
                  line_num = patch["line"]
                  msg = patch["msg"]
                  target_idx = line_num - 1

                  if target_idx >= len(lines):
                      continue

                  start_idx = max(0, line_num - 40)
                  end_idx = min(len(lines), line_num + 40)
                  context_snippet = "".join(lines[start_idx:end_idx])
                  original_line = lines[target_idx]

                  fixed_line = None
                  for current_model in models_pool:
                      try:
                          print(f"  -> Patching line {line_num} using: {current_model}")
                          response = client.chat.completions.create(
                              model=current_model,
                              messages=[
                                  {"role": "system", "content": f"You are an expert C# refactoring tool. Fix the bug within the provided snippet.\nInstructions:\n1. Match the exact indent spacing (tabs/spaces) of the original target line.\n2. Return ONLY the fully corrected code snippet replacing the original block. Do not wrap code blocks in markdown fences, do not output explanations, and do not append stray braces.\n3. Respect the rules.\nRules:\n{rules}"},
                                  {"role": "user", "content": f"Vulnerability Type: {msg}\nTarget Line Number: {line_num}\n\nCode Snippet:\n{context_snippet}"}
                              ],
                              temperature=0.1,
                              max_tokens=1024
                          )
                          
                          raw_content = response.choices[0].message.content
                          
                          clean_content = re.sub(r'```(?:csharp)?', '', raw_content, flags=re.IGNORECASE).strip()
                          if clean_content.endswith("```"):
                              clean_content = clean_content[:-3].strip()

                          if len(clean_content) > 1:
                              leading_spaces = len(original_line) - len(original_line.lstrip())
                              indent = original_line[:leading_spaces]
                              fixed_line = indent + clean_content
                              break
                              
                      except Exception as e:
                          print(f"  ⚠️ Issue with {current_model}: {e}. Retrying model fallback...")
                          time.sleep(2)

                  if fixed_line:
                      lines[target_idx] = fixed_line + "\n"
                      file_was_patched = True
                      time.sleep(2)
                  else:
                      print(f"❌ Failed to patch line {line_num}")

              if file_was_patched:
                  with open(uri, "w") as f_code_w:
                      f_code_w.writelines(lines)
                  print(f"✅ Successfully completed all clean updates for: {uri}")
                  fixed_count += 1

          print(f"Code repair cycle completed. Total files safely updated: {fixed_count}")
          EOF
          python fix_code.py
          rm fix_code.py
          
      - name: Create Pull Request with AI Fixes
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "style: resolve static security vulnerabilities via Groq AI"
          title: "🤖 Automated Groq Security Patch"
          body: "This PR automatically fixes static analysis alerts generated by the Semgrep security runner pipeline using Groq Cloud Models according to repository guidelines."
          branch: groq-ai-patches
          base: 'master'
          delete-branch: true
