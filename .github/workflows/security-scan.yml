name: "Security & Bug Detection Pipeline"

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  schedule:
    - cron: '0 0 * * 1' # Runs automatically every Monday at midnight
  workflow_dispatch: # Allows you to trigger the scan manually

jobs:
  # Job 1: Deep Security Analysis using GitHub CodeQL
  codeql-analysis:
    name: CodeQL Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # Tailored to OpenSim's dotnet 8.0 dependency

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'csharp'
          queries: security-extended,security-and-quality # Scans for both exploits and design flaws

      # OpenSim requires a compiled environment for CodeQL to trace data flows
      - name: Restore Dependencies & Build
        run: |
          dotnet restore OpenSim.sln
          dotnet build OpenSim.sln --configuration Debug

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"

  # Job 2: Rapid Bug and Code-Smell Detection using Semgrep
  semgrep-analysis:
    name: Semgrep Bug Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Semgrep Scan
        run: |
          semgrep scan --config auto --sarif --output semgrep-results.sarif

      - name: Upload Semgrep Results to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif
        if: always() # Ensures logs upload even if vulnerabilities are found
