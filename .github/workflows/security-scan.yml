name: "Security & Bug Detection Pipeline"

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch: 

permissions:
  contents: write
  pull-requests: write
  actions: read
  security-events: write

jobs:
  codeql-analysis:
    name: CodeQL Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Pin .NET SDK Version
        run: |
          echo '{"sdk":{"version":"8.0.100","rollForward":"latestFeature"}}' > global.json

      - name: Generate OpenSim Project Files
        run: |
          chmod +x runprebuild.sh
          ./runprebuild.sh dotnet8

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: 'csharp'
          queries: security-extended,security-and-quality 

      - name: Restore Dependencies & Build
        run: |
          dotnet restore OpenSim.sln
          dotnet build OpenSim.sln --configuration Debug

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:csharp"

  semgrep-and-autofix:
    name: Semgrep Scan & OpenRouter Free Fix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Semgrep & AI Dependencies
        run: |
          pip install semgrep openai==1.58.0 

      - name: Run Semgrep Scan
        run: |
          semgrep scan --config p/csharp --config p/security-audit --sarif --output semgrep-results.sarif
        continue-on-error: true

      - name: Execute Automated Code Repair Script
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          cat << 'EOF' > fix_code.py
          import os
          import json
          import re
          import time
          from openai import OpenAI

          client = OpenAI(
              base_url="https://openrouter.ai",
              api_key=os.environ.get("OPENROUTER_API_KEY")
          )

          rules = ""
          if os.path.exists(".github/copilot-instructions.md"):
              with open(".github/copilot-instructions.md", "r") as f:
                  rules = f.read()

          if not os.path.exists("semgrep-results.sarif"):
              print("Critical: semgrep-results.sarif was not found on disk.")
              exit(0)

          with open("semgrep-results.sarif", "r") as f:
              sarif_data = json.load(f)

          runs = sarif_data.get("runs", [])
          fixed_count = 0

          for run in runs:
              for result in run.get("results", []):
                  msg = result.get("message", {}).get("text", "")
                  for loc in result.get("locations", []):
                      uri = loc.get("physicalLocation", {}).get("artifactLocation", {}).get("uri", "")
                      
                      if uri.startswith("file://"):
                          uri = uri.replace("file://", "")
                      
                      if uri and os.path.exists(uri) and uri.endswith(".cs"):
                          print(f"🤖 AI processing C# file: {uri}")
                          
                          with open(uri, "r") as f_code:
                              original_code = f_code.read()

                          try:
                              # Direct routing to stable Qwen 2.5 Coder Free to limit translation layers
                              response = client.chat.completions.create(
                                  model="qwen/qwen-2.5-coder-7b-instruct:free",
                                  messages=[
                                      {"role": "system", "content": f"You are a strict C# compilation system. Fix the requested bug. Do NOT return markdown formatting tags, html tags, explanations, or web pages. Return ONLY valid, pure C# code.\nGuidelines:\n{rules}"},
                                      {"role": "user", "content": f"Security Issue: {msg}\n\nOriginal Source Code:\n{original_code}"}
                                  ]
                              )
                              
                              fixed_code = response.choices.message.content.strip()

                              # HARD TRIPWIRE check for OpenRouter rate-limiting HTML response pages
                              cleaned_check = fixed_code.lower().strip()
                              if cleaned_check.startswith("<!doctype html") or "<html" in cleaned_check or "<div" in cleaned_check or "next/static" in cleaned_check:
                                  print(f"🛑 CRITICAL REJECTION: OpenRouter returned an HTML error webpage for {uri}. Skipping modification to protect source files.")
                                  continue

                              # Extra syntax guard: ensure the AI actually returned C# code blocks
                              code_match = re.search(r'```(?:csharp)?(.*?)```', fixed_code, re.DOTALL | re.IGNORECASE)
                              if code_match:
                                  fixed_code = code_match.group(1).strip()

                              if len(fixed_code) < 20 or "using " not in fixed_code:
                                  print(f"⚠️ Warning: Output for {uri} appears corrupted or short-cut. Preserving original file.")
                                  continue

                              with open(uri, "w") as f_code_w:
                                  f_code_w.write(fixed_code)
                              
                              print(f"✅ Successfully patched: {uri}")
                              fixed_count += 1
                              
                              # CRITICAL: Sleep for 5 seconds to bypass API rate-limiting rules
                              time.sleep(5)
                              
                          except Exception as e:
                              print(f"Failed to patch file {uri}: {e}")
                              time.sleep(5)

          print(f"Code repair cycle completed. Total files safely patched: {fixed_count}")
          EOF
          python fix_code.py
          rm fix_code.py

      - name: Create Pull Request with AI Fixes
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "style: resolve static security vulnerabilities via OpenRouter AI"
          title: "🤖 Automated OpenRouter Security Patch"
          body: "This PR automatically fixes static analysis alerts generated by the Semgrep security runner pipeline according to your structural repository guidelines."
          branch: openrouter-ai-patches
          base: 'master'
          delete-branch: true
