name: "Security & Bug Detection Pipeline"

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  schedule:
    - cron: '0 0 * * 1' 
  workflow_dispatch: 

jobs:
  # Job 1: Deep Security Analysis using GitHub CodeQL
  codeql-analysis:
    name: CodeQL Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5 # Upgraded from v4 for Node 24 compatibility

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5 # Upgraded from v4 for Node 24 compatibility
        with:
          dotnet-version: '8.0.422' 

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4 # Upgraded from v3 for Node 24 compatibility
        with:
          languages: 'csharp'
          queries: security-extended,security-and-quality 

      - name: Restore Dependencies & Build
        run: |
          dotnet restore OpenSim.sln
          dotnet build OpenSim.sln --configuration Debug

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4 # Upgraded from v3 for Node 24 compatibility
        with:
          category: "/language:csharp"

  # Job 2: Rapid Bug and Code-Smell Detection using Semgrep
  semgrep-analysis:
    name: Semgrep Bug Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5 # Upgraded from v4 for Node 24 compatibility

      - name: Run Semgrep Scan
        run: |
          semgrep scan --config auto --sarif --output semgrep-results.sarif

      - name: Upload Semgrep Results to GitHub
        uses: github/codeql-action/upload-sarif@v4 # Upgraded from v3 for Node 24 compatibility
        with:
          sarif_file: semgrep-results.sarif
        if: always() 
