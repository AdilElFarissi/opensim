name: "Security & Bug Detection Pipeline"

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  schedule:
    - cron: '0 0 * * 1' 
  workflow_dispatch: 

jobs:
  codeql-analysis:
    name: CodeQL Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      # Forces MSBuild and NuGet to strictly use .NET 8 instead of the global SDK v10
      - name: Pin .NET SDK Version
        run: |
          echo '{"sdk":{"version":"8.0.100","rollForward":"latestFeature"}}' > global.json

      # Essential step: Generates all the missing .csproj files required by OpenSim.sln
      - name: Generate OpenSim Project Files
        run: |
          chmod +x runprebuild.sh
          ./runprebuild.sh

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: 'csharp'
          queries: security-extended,security-and-quality 

      - name: Restore Dependencies & Build
        run: |
          dotnet restore OpenSim.sln
          dotnet build OpenSim.sln --configuration Debug

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:csharp"

  semgrep-analysis:
    name: Semgrep Bug Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Run Semgrep Scan
        run: |
          semgrep scan --config auto --sarif --output semgrep-results.sarif

      - name: Upload Semgrep Results to GitHub
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-results.sarif
        if: always() 

  openrouter-autofix:
    name: Free OpenRouter AI Autofix
    runs-on: ubuntu-latest
    needs: [codeql-analysis, semgrep-analysis]
    if: always() # Executes even if the scanners flag critical bugs

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install AI Dependencies
        run: pip install openai

      - name: Execute Automated Code Repair Script
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          cat << 'EOF' > fix_code.py
          import os
          import json
          from openai import OpenAI

          # Configure connection to OpenRouter API endpoint
          client = OpenAI(
              base_url="https://openrouter.ai",
              api_key=os.environ.get("OPENROUTER_API_KEY")
          )

          # 1. Load your custom OpenSim ruleset
          rules = ""
          if os.path.exists(".github/copilot-instructions.md"):
              with open(".github/copilot-instructions.md", "r") as f:
                  rules = f.read()

          # 2. Parse Semgrep security report logs
          if not os.path.exists("semgrep-results.sarif"):
              print("No Semgrep results found to fix.")
              exit(0)

          with open("semgrep-results.sarif", "r") as f:
              sarif_data = json.load(f)

          # Extract target files containing flagged vulnerabilities
          runs = sarif_data.get("runs", [])
          for run in runs:
              for result in run.get("results", []):
                  msg = result.get("message", {}).get("text", "")
                  for loc in result.get("locations", []):
                      uri = loc.get("physicalLocation", {}).get("artifactLocation", {}).get("uri", "")
                      
                      if uri and os.path.exists(uri):
                          print(f"Repairing file: {uri}")
                          with open(uri, "r") as f_code:
                              original_code = f_code.read()

                          # Target a strong free coding model from OpenRouter
                          response = client.chat.completions.create(
                              model="qwen/qwen3-coder-next:free",
                              messages=[
                                  {"role": "system", "content": f"You are an expert C# compiler assistant. Fix the following code vulnerability. Adhere strictly to these architecture guidelines:\n{rules}\nReturn ONLY the raw fixed code. Do not include markdown code block syntax (like ```csharp)."},
                                  {"role": "user", "content": f"Vulnerability Details: {msg}\n\nFile Content:\n{original_code}"}
                              ]
                          )
                          
                          fixed_code = response.choices[0].message.content.strip()
                          # Clean up accidental LLM markdown wrapping if present
                          if fixed_code.startswith("```"):
                              fixed_code = "\n".join(fixed_code.split("\n")[1:-1])

                          with open(uri, "w") as f_code_w:
                              f_code_w.write(fixed_code)

          print("Code repair cycle successfully completed.")
          EOF
          python fix_code.py

      # Automatically bundles the modified C# changes and submits them as a PR
      - name: Create Pull Request with AI Fixes
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "style: resolve static security vulnerabilities via OpenRouter AI"
          title: "🤖 Automated OpenRouter Security Patch"
          body: "This PR automatically fixes static analysis alerts generated by the Semgrep security runner pipeline according to your structural repository guidelines."
          branch: openrouter-ai-patches
          delete-branch: true
